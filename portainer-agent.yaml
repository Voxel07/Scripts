version: '3.8'

services:
  portainer_agent:
    image: portainer/agent:latest
    container_name: portainer_agent
    restart: always
    ports:
      - "9001:9001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    environment:
      # Agent secret for additional security (optional)
      - AGENT_SECRET=your-secret-key-here
      # Log level: DEBUG, INFO, WARN, ERROR
      - LOG_LEVEL=INFO
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer-agent.rule=Host(`agent.yourdomain.com`)"
      - "traefik.http.routers.portainer-agent.entrypoints=websecure"
      - "traefik.http.routers.portainer-agent.tls.certresolver=letsencrypt"
      - "traefik.http.services.portainer-agent.loadbalancer.server.port=9001"

networks:
  traefik-public:
    external: true
